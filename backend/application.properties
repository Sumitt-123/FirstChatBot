# External override properties for local mock
server.port=8080
server.servlet.context-path=/api

# LLM configuration for Hugging Face Router (use pipeline-aware endpoint)
# Use the router generation pipeline and a supported model repo_id.
# Recommended supported model for testing: meta-llama/Llama-3.2-3B-Instruct
llm.api.endpoint=https://router.huggingface.co/hf-inference/generation
llm.api.model=meta-llama/Llama-3.2-3B-Instruct
llm.api.token=${HUGGINGFACE_API_TOKEN:test-token}
llm.api.timeout=30
llm.api.max-length=100

# CORS: allow local dev ports
cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5175
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

