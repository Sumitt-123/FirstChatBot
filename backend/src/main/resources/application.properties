# Spring Boot Application Properties
server.port=8080
server.servlet.context-path=/api

# Application Name
spring.application.name=FirstChatBot Backend

# Logging Configuration
logging.level.root=INFO
logging.level.com.firstchatbot=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# LLM Configuration
# Use Hugging Face Inference API
llm.api.type=huggingface
llm.api.endpoint=https://api-inference.huggingface.co/models/
llm.api.model=gpt2
# Get free API token from https://huggingface.co/settings/tokens
llm.api.token=${HUGGINGFACE_API_TOKEN:test-token}
llm.api.timeout=30
llm.api.max-length=100

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5175
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# API Documentation
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

